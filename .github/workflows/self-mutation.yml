name: Lab Self-Check
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Attempt self-modification
        run: |
          echo "# Modified" >> .github/workflows/H051-self-mutate.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/
          git commit -m "self-check mark"
          git push origin main
