# VULNERABLE: Credential leakage via artifact
name: Vulnerable Artifact Upload

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # VULNERABLE: persist-credentials defaults to true
        # Token is stored in .git/config

      - name: Build
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .  # VULNERABLE: Uploads entire workspace including .git/
