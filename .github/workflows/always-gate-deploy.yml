name: H077 Gated Deploy
on:
  issue_comment:
    types: [created]
jobs:
  gate:
    runs-on: ubuntu-latest
    if: >-
      github.event.issue.pull_request &&
      github.event.comment.author_association == '"'"'MEMBER'"'"'
    outputs:
      approved: ${{ steps.check.outputs.approved }}
    steps:
      - id: check
        run: echo "approved=true" >> "\$GITHUB_OUTPUT"
  deploy:
    needs: gate
    if: always()
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.LAB_SECRET }}
    steps:
      - name: Deploy
        run: |
          echo "Gate result: ${{ needs.gate.outputs.approved }}"
          echo "Comment: ${{ github.event.comment.body }}"
          echo "Deploying"
